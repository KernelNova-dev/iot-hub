<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="800" viewBox="0 0 1250 800" role="img" aria-labelledby="title desc">
  <title id="title">WireGate abstraction relations</title>
  <desc id="desc">Dependency inversion boundaries between service, modules, device manager, and infrastructure.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="inherit" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M 10 6 L 1 1 L 1 11 z" fill="#ffffff" stroke="#475569" stroke-width="1.4"/>
    </marker>
    <style>
      .page { fill: #f8fafc; }
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #64748b; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
      .iface { fill: #e0f2fe; }
      .impl { fill: #dcfce7; }
      .module { fill: #fef3c7; }
      .infra { fill: #f3e8ff; }
      .name { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .kind { font: italic 12px Arial, sans-serif; fill: #64748b; }
      .mono { font: 400 12px Consolas, Monaco, monospace; fill: #334155; }
      .dep { fill: none; stroke: #475569; stroke-width: 1.7; marker-end: url(#arrow); }
      .inherit { fill: none; stroke: #475569; stroke-width: 1.7; marker-end: url(#inherit); }
      .label-bg { fill: #f8fafc; opacity: 0.96; }
      .label { font: 700 11px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="page" width="1250" height="800"/>
  <text class="title" x="56" y="54">WireGate abstraction relations</text>
  <text class="subtitle" x="56" y="80">Main extension points and dependency-inversion boundaries.</text>

  <g transform="translate(80 130)">
    <rect class="box iface" width="240" height="118"/>
    <text class="name" x="20" y="30">Service</text>
    <text class="kind" x="20" y="52">&lt;&lt;interface&gt;&gt;</text>
    <text class="mono" x="20" y="80">installModule(...)</text>
    <text class="mono" x="20" y="100">startMainLoop(...)</text>
  </g>

  <g transform="translate(80 360)">
    <rect class="box iface" width="240" height="142"/>
    <text class="name" x="20" y="30">ServiceModule</text>
    <text class="kind" x="20" y="52">&lt;&lt;extension point&gt;&gt;</text>
    <text class="mono" x="20" y="80">initialize(settings)</text>
    <text class="mono" x="20" y="100">start(context)</text>
    <text class="mono" x="20" y="120">execute(context)</text>
  </g>

  <g transform="translate(80 610)">
    <rect class="box iface" width="240" height="116"/>
    <text class="name" x="20" y="30">DeviceManager</text>
    <text class="kind" x="20" y="52">&lt;&lt;interface&gt;&gt;</text>
    <text class="mono" x="20" y="80">list(), find(id)</text>
    <text class="mono" x="20" y="100">sendCommand(...)</text>
  </g>

  <g transform="translate(500 145)">
    <rect class="box impl" width="250" height="86"/>
    <text class="name" x="20" y="32">WireGateService</text>
    <text class="kind" x="20" y="56">&lt;&lt;implementation&gt;&gt;</text>
  </g>

  <g transform="translate(500 320)">
    <rect class="box module" width="250" height="82"/>
    <text class="name" x="20" y="32">IpcServiceModule</text>
    <text class="kind" x="20" y="56">&lt;&lt;active module&gt;&gt;</text>
  </g>

  <g transform="translate(500 465)">
    <rect class="box module" width="250" height="82"/>
    <text class="name" x="20" y="32">DevicePoolModule</text>
    <text class="kind" x="20" y="56">&lt;&lt;tick module&gt;&gt;</text>
  </g>

  <g transform="translate(500 625)">
    <rect class="box impl" width="250" height="82"/>
    <text class="name" x="20" y="32">DeviceRegistry</text>
    <text class="kind" x="20" y="56">&lt;&lt;implementation&gt;&gt;</text>
  </g>

  <g transform="translate(900 320)">
    <rect class="box infra" width="250" height="82"/>
    <text class="name" x="20" y="32">IpcServer</text>
    <text class="kind" x="20" y="56">&lt;&lt;infrastructure&gt;&gt;</text>
  </g>

  <path class="inherit" d="M500 188 C430 188 390 188 320 188"/>
  <path class="inherit" d="M500 361 C430 390 390 415 320 431"/>
  <path class="inherit" d="M500 506 C430 488 390 466 320 431"/>
  <path class="inherit" d="M500 666 C430 666 390 668 320 668"/>

  <path class="dep" d="M625 231 C625 300 430 346 320 412"/>
  <rect class="label-bg" x="430" y="306" width="82" height="16"/>
  <text class="label" x="436" y="318">lifecycle calls</text>

  <path class="dep" d="M560 231 C440 310 385 555 320 662"/>
  <rect class="label-bg" x="342" y="565" width="105" height="16"/>
  <text class="label" x="348" y="577">owns abstraction</text>

  <path class="dep" d="M545 402 C440 455 385 585 320 648"/>
  <rect class="label-bg" x="350" y="520" width="140" height="16"/>
  <text class="label" x="356" y="532">depends on abstraction</text>

  <path class="dep" d="M545 547 C455 572 390 640 320 668"/>
  <path class="dep" d="M750 361 C805 361 845 361 900 361"/>
  <rect class="label-bg" x="800" y="340" width="45" height="16"/>
  <text class="label" x="806" y="352">adapts</text>
</svg>
