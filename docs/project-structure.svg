<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">WireGate project structure and build flow</title>
  <desc id="desc">A simple diagram showing how Git, tools/build.sh, Conan, and Meson interact to build the WireGate C++ project.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#526176"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8A96A8"/>
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1F2937" flood-opacity="0.08"/>
    </filter>
    <style>
      .page { fill: #F6F8FB; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #172033; }
      .subtitle { font: 400 15px Arial, Helvetica, sans-serif; fill: #667085; }
      .card { fill: #FFFFFF; stroke: #D7DEE9; stroke-width: 1.5; rx: 8; filter: url(#soft-shadow); }
      .head { stroke-width: 0; rx: 8; }
      .head-text { font: 700 18px Arial, Helvetica, sans-serif; fill: #172033; }
      .section-title { font: 700 14px Arial, Helvetica, sans-serif; fill: #283548; }
      .text { font: 400 13px Arial, Helvetica, sans-serif; fill: #344054; }
      .muted { font: 400 12px Arial, Helvetica, sans-serif; fill: #667085; }
      .code { font: 700 13px Consolas, Monaco, monospace; fill: #172033; }
      .pill-text { font: 700 12px Arial, Helvetica, sans-serif; fill: #172033; }
      .mini { fill: #F8FAFC; stroke: #E2E8F0; stroke-width: 1; rx: 8; }
      .flow { fill: none; stroke: #526176; stroke-width: 2.2; marker-end: url(#arrow); }
      .flow-dashed { fill: none; stroke: #8A96A8; stroke-width: 2; stroke-dasharray: 7 6; marker-end: url(#arrow-dashed); }
      .flow-label-bg { fill: #FFFFFF; stroke: #D7DEE9; stroke-width: 1; rx: 6; }
      .flow-label { font: 700 12px Arial, Helvetica, sans-serif; fill: #344054; }
      .small-dot { fill: #526176; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1440" height="980"/>

  <text class="title" x="60" y="58">WireGate project structure and build flow</text>
  <text class="subtitle" x="60" y="84">Git stores the working tree; the build script orchestrates Conan dependency setup and Meson/Ninja compilation.</text>

  <!-- Git / repository structure -->
  <g id="git-repository">
    <rect class="card" x="60" y="120" width="330" height="700"/>
    <rect class="head" x="60" y="120" width="330" height="58" fill="#FFF3DC"/>
    <text class="head-text" x="84" y="156">Git repository</text>
    <text class="muted" x="84" y="177">.git history + working tree</text>

    <rect class="mini" x="82" y="205" width="286" height="190"/>
    <text class="section-title" x="102" y="232">Project inputs</text>
    <circle class="small-dot" cx="105" cy="258" r="3"/><text class="code" x="118" y="263">tools/build.sh</text>
    <circle class="small-dot" cx="105" cy="284" r="3"/><text class="code" x="118" y="289">conanfile.py</text>
    <circle class="small-dot" cx="105" cy="310" r="3"/><text class="code" x="118" y="315">meson.build</text>
    <circle class="small-dot" cx="105" cy="336" r="3"/><text class="code" x="118" y="341">src/meson.build</text>
    <circle class="small-dot" cx="105" cy="362" r="3"/><text class="code" x="118" y="367">tools/profiles/profile.default</text>

    <rect class="mini" x="82" y="420" width="286" height="150"/>
    <text class="section-title" x="102" y="447">Source modules</text>
    <circle class="small-dot" cx="105" cy="473" r="3"/><text class="code" x="118" y="478">src/core</text><text class="text" x="205" y="478">common logging lib</text>
    <circle class="small-dot" cx="105" cy="499" r="3"/><text class="code" x="118" y="504">src/ipc</text><text class="text" x="205" y="504">IPC library</text>
    <circle class="small-dot" cx="105" cy="525" r="3"/><text class="code" x="118" y="530">src/service</text><text class="text" x="220" y="530">main service</text>
    <circle class="small-dot" cx="105" cy="551" r="3"/><text class="code" x="118" y="556">src/cli</text><text class="text" x="205" y="556">CLI placeholder</text>

    <rect class="mini" x="82" y="595" width="286" height="165"/>
    <text class="section-title" x="102" y="622">Git boundary</text>
    <circle class="small-dot" cx="105" cy="648" r="3"/><text class="code" x="118" y="653">.gitignore</text><text class="text" x="206" y="653">keeps generated files out</text>
    <circle class="small-dot" cx="105" cy="674" r="3"/><text class="code" x="118" y="679">build/</text><text class="text" x="178" y="679">Conan + Meson output</text>
    <circle class="small-dot" cx="105" cy="700" r="3"/><text class="code" x="118" y="705">builddir/</text><text class="text" x="200" y="705">ignored alternate output</text>
    <circle class="small-dot" cx="105" cy="726" r="3"/><text class="code" x="118" y="731">.conan2/</text><text class="text" x="200" y="731">ignored local cache data</text>
  </g>

  <!-- Script -->
  <g id="build-script">
    <rect class="card" x="450" y="130" width="280" height="260"/>
    <rect class="head" x="450" y="130" width="280" height="58" fill="#E8F1FF"/>
    <text class="head-text" x="474" y="166">Build script</text>
    <text class="code" x="474" y="187">tools/build.sh</text>

    <text class="section-title" x="474" y="222">Orchestrates commands</text>
    <text class="text" x="474" y="250">1. clean/rebuild optional</text>
    <text class="text" x="474" y="276">2. sync Conan profile template</text>
    <text class="text" x="474" y="302">3. run conan install</text>
    <text class="text" x="474" y="328">4. run meson setup</text>
    <text class="text" x="474" y="354">5. run meson compile</text>
  </g>

  <!-- Conan -->
  <g id="conan">
    <rect class="card" x="800" y="120" width="560" height="270"/>
    <rect class="head" x="800" y="120" width="560" height="58" fill="#E6FBF5"/>
    <text class="head-text" x="824" y="156">Conan dependency layer</text>
    <text class="code" x="824" y="177">conanfile.py</text>

    <rect class="mini" x="824" y="205" width="240" height="145"/>
    <text class="section-title" x="844" y="232">Requirements</text>
    <text class="text" x="844" y="260">asio</text>
    <text class="text" x="844" y="286">nlohmann_json</text>
    <text class="text" x="844" y="312">spdlog, CLI11</text>
    <text class="muted" x="844" y="338">Resolved with profile.default</text>

    <rect class="mini" x="1090" y="205" width="246" height="145"/>
    <text class="section-title" x="1110" y="232">Generated for Meson</text>
    <text class="code" x="1110" y="260">PkgConfigDeps</text>
    <text class="code" x="1110" y="286">conan_meson_native.ini</text>
    <text class="code" x="1110" y="312">VirtualBuildEnv</text>
    <text class="muted" x="1110" y="338">Also provides Meson + Ninja tools</text>
  </g>

  <!-- Meson -->
  <g id="meson">
    <rect class="card" x="800" y="450" width="560" height="360"/>
    <rect class="head" x="800" y="450" width="560" height="58" fill="#F1EBFF"/>
    <text class="head-text" x="824" y="486">Meson / Ninja build graph</text>
    <text class="code" x="824" y="507">meson.build + src/*/meson.build</text>

    <rect class="mini" x="824" y="535" width="238" height="220"/>
    <text class="section-title" x="844" y="562">Meson inputs</text>
    <text class="text" x="844" y="590">C++23 project options</text>
    <text class="text" x="844" y="616">dependency('asio')</text>
    <text class="text" x="844" y="642">dependency('nlohmann_json')</text>
    <text class="text" x="844" y="668">dependency('spdlog')</text>
    <text class="text" x="844" y="694">dependency('CLI11')</text>
    <text class="muted" x="844" y="730">tests/ exists; root test subdir is off</text>

    <rect class="mini" x="1090" y="535" width="246" height="220"/>
    <text class="section-title" x="1110" y="562">Targets</text>
    <text class="code" x="1110" y="590">wiregate-core</text>
    <text class="text" x="1230" y="590">uses spdlog</text>
    <text class="code" x="1110" y="616">ipc</text>
    <text class="text" x="1152" y="616">uses asio + json</text>
    <text class="code" x="1110" y="642">wiregate-service</text>
    <text class="text" x="1110" y="668">links core + ipc + json</text>
    <text class="text" x="1110" y="700">final executable</text>
  </g>

  <!-- Output -->
  <g id="generated-output">
    <rect class="card" x="800" y="850" width="560" height="86"/>
    <rect class="head" x="800" y="850" width="560" height="40" fill="#ECFDF3"/>
    <text class="head-text" x="824" y="877">Generated output</text>
    <text class="code" x="824" y="914">build/conan/</text>
    <text class="text" x="934" y="914">dependency metadata</text>
    <text class="code" x="1120" y="914">build/meson/</text>
    <text class="text" x="1232" y="914">Ninja files + artifacts</text>
  </g>

  <!-- Flow arrows -->
  <path class="flow" d="M 390 250 C 410 250 430 250 450 250"/>
  <rect class="flow-label-bg" x="396" y="219" width="92" height="24"/>
  <text class="flow-label" x="408" y="236">run script</text>

  <path class="flow" d="M 730 260 C 750 260 775 260 800 260"/>
  <rect class="flow-label-bg" x="734" y="229" width="104" height="24"/>
  <text class="flow-label" x="746" y="246">conan install</text>

  <path class="flow" d="M 1080 390 C 1080 410 1080 430 1080 450"/>
  <rect class="flow-label-bg" x="1100" y="411" width="160" height="24"/>
  <text class="flow-label" x="1112" y="428">native file + deps</text>

  <path class="flow" d="M 590 390 C 610 430 740 430 800 515"/>
  <rect class="flow-label-bg" x="587" y="417" width="170" height="24"/>
  <text class="flow-label" x="599" y="434">meson setup/compile</text>

  <path class="flow-dashed" d="M 390 540 C 510 620 670 635 800 635"/>
  <rect class="flow-label-bg" x="486" y="612" width="170" height="24"/>
  <text class="flow-label" x="498" y="629">source build files</text>

  <path class="flow" d="M 1080 810 C 1080 826 1080 836 1080 850"/>
  <rect class="flow-label-bg" x="1100" y="819" width="72" height="24"/>
  <text class="flow-label" x="1112" y="836">build</text>

  <path class="flow-dashed" d="M 368 705 C 520 820 650 890 800 898"/>
  <rect class="flow-label-bg" x="470" y="795" width="172" height="24"/>
  <text class="flow-label" x="482" y="812">ignored by Git</text>

  <!-- Legend -->
  <g id="legend">
    <rect class="mini" x="60" y="860" width="330" height="76"/>
    <path class="flow" d="M 88 884 L 148 884"/>
    <text class="muted" x="166" y="889">command/data flow</text>
    <path class="flow-dashed" d="M 88 918 L 148 918"/>
    <text class="muted" x="166" y="923">Git boundary or working-tree input</text>
  </g>
</svg>
